<!DOCTYPE html>
<html>
<head>
<title>Delete Item | CEC Lost And Found</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.header{
background:#031228;
color:white;
padding:20px;
text-align:center;
}

.container{
width:500px;
margin:40px auto;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.12);
text-align:center;
}

button{
padding:14px 24px;
background:#dc3545;
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
margin-right:10px;
}

button:hover{
cursor:pointer;
background:#bb2d3b;
}

.cancel{
display:inline-block;
padding:14px 24px;
background:#e9ecef;
color:#051225;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.back{
display:inline-block;
margin-bottom:20px;
color:#051225;
text-decoration:none;
}

.footer{
text-align:center;
padding:15px;
color:gray;
}

</style>

</head>

<body>

<div class="header">
<h1>Delete Item</h1>
<p>This action cannot be undone</p>
</div>

<div class="container">

<a class="back" href="/">
← Back to Home
</a>

<h2>Delete "{{item.title}}"?</h2>

<form method="POST">

{% csrf_token %}

<button type="submit">Yes, Delete</button>
<a class="cancel" href="/">Cancel</a>

</form>

</div>

<div class="footer">
CEC Lost & Found Portal
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Add Item | CEC Lost And Found</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.header{
background:#031228;
color:white;
padding:20px;
text-align:center;
}

.container{
width:500px;
margin:40px auto;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.12);
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
background:#198754;
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
}

button:hover{
cursor:pointer;
background:#157347;
}

.back{
display:inline-block;
margin-bottom:20px;
color:#051225;
text-decoration:none;
}

.footer{
text-align:center;
padding:15px;
color:gray;
}

#image-preview{
display:none;
width:100%;
margin-top:8px;
margin-bottom:18px;
border-radius:8px;
border:1px solid #ccc;
object-fit:contain;
max-height:300px;
}

</style>

</head>

<body>

<div class="header">
<h1>Add Lost / Found Item</h1>
<p>Upload details so others can find or claim it</p>
</div>

<div class="container">

<a class="back" href="/">
← Back to Home
</a>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

{{form.as_p}}

<img id="image-preview" src="" alt="Image Preview">

<button>
Submit Item
</button>

</form>

</div>

<div class="footer">
CEC Lost & Found Portal
</div>

<script>
document.getElementById('id_image').addEventListener('change', function(event) {
    var file = event.target.files[0];

    if (!file) {
        return;
    }

    var reader = new FileReader();

    reader.onload = function(e) {
        var preview = document.getElementById('image-preview');
        preview.src = e.target.result;
        preview.style.display = 'block';
    };

    reader.readAsDataURL(file);
});
</script>

</body>
</html>
